openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OCMS — Construction ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: Auth
  - name: Me
  - name: Organisations
  - name: Projects
  - name: WBS
  - name: Milestones
  - name: DPR
  - name: Photos
  - name: Documents
  - name: Issues
  - name: Approvals
  - name: Dashboard
  - name: Financial
  - name: SupplyChain
  - name: Workforce
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadUrlRequest' }
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadUrlResponse' }
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema: { type: string, format: binary }
        '404':
          description: File not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema: { type: string, format: binary }
        '404':
          description: Object not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Create a new user account and organisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created and session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutUser
      summary: Clear the current session
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /me/profile:
    get:
      tags: [Me]
      operationId: getMyProfile
      summary: Get my OCMS profile (role, organisation)
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProfile'
    patch:
      tags: [Me]
      operationId: updateMyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyProfileUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProfile'

  /organisations:
    get:
      tags: [Organisations]
      operationId: listOrganisations
      responses:
        '200':
          description: List of organisations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Organisation' }
    post:
      tags: [Organisations]
      operationId: createOrganisation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganisationInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organisation' }
  /organisations/{organisationId}:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    get:
      tags: [Organisations]
      operationId: getOrganisation
      responses:
        '200':
          description: Organisation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organisation' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    patch:
      tags: [Organisations]
      operationId: updateOrganisation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganisationUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organisation' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /modules:
    get:
      tags: [Modules]
      operationId: listModules
      summary: Canonical list of toggleable modules
      responses:
        '200':
          description: Module registry
          content:
            application/json:
              schema:
                type: object
                required: [modules]
                properties:
                  modules:
                    type: array
                    items: { type: string }
  /organisations/{organisationId}/modules:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    patch:
      tags: [Modules]
      operationId: updateOrganisationModules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: [array, 'null']
                  items: { type: string }
      responses:
        '200':
          description: Updated org modules
          content:
            application/json:
              schema:
                type: object
                required: [organisationId, enabledModules]
                properties:
                  organisationId: { type: string }
                  enabledModules:
                    type: [array, 'null']
                    items: { type: string }
  /organisations/{organisationId}/users:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    get:
      tags: [Organisations]
      operationId: listOrganisationUsers
      responses:
        '200':
          description: Users belonging to the organisation
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrganisationUser' }

  /auth/register-tenant:
    post:
      tags: [Auth]
      operationId: registerTenant
      summary: Self-service tenant registration — creates user + org + free plan subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTenantRequest'
      responses:
        '201':
          description: Tenant created, session started.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterTenantResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Email already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /invitations/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Invitations]
      operationId: getInvitationByToken
      summary: Validate an invitation token (public — no auth required)
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationTokenDetail' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '410':
          description: Expired, accepted, or revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /invitations/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Invitations]
      operationId: acceptInvitation
      summary: Accept an invitation. Creates account if needed, starts session.
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptInvitationRequest' }
      responses:
        '200':
          description: Invitation accepted, session started.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AcceptInvitationResponse' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '410':
          description: Invitation no longer valid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /organisations/{organisationId}/invitations:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    get:
      tags: [Invitations]
      operationId: listOrgInvitations
      summary: List all invitations for an organisation
      responses:
        '200':
          description: List of invitations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrgInvitation' }
    post:
      tags: [Invitations]
      operationId: createOrgInvitation
      summary: Send an invitation to a new team member
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgInvitationInput' }
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgInvitation' }
        '400':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403':
          description: Plan limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Pending invitation already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /organisations/{organisationId}/invitations/{invitationId}:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
      - name: invitationId
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Invitations]
      operationId: revokeOrgInvitation
      summary: Revoke a pending invitation
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '404':
          description: Not found or already accepted/revoked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /organisations/{organisationId}/members:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    get:
      tags: [Organisations]
      operationId: listOrgMembers
      summary: List all members of an organisation
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrgMember' }

  /organisations/{organisationId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
      - name: userId
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [Organisations]
      operationId: updateOrgMemberRole
      summary: Change a member's role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgMemberRoleUpdate' }
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400':
          description: Invalid role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Member not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Organisations]
      operationId: removeOrgMember
      summary: Remove a member from the organisation
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400':
          description: Cannot remove yourself
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Member not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /organisations/{organisationId}/onboarding/complete:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    post:
      tags: [Organisations]
      operationId: completeOrgOnboarding
      summary: Mark the onboarding wizard as completed for this organisation
      responses:
        '200':
          description: Marked complete
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /organisations/{organisationId}/subscription:
    parameters:
      - $ref: '#/components/parameters/OrganisationIdParam'
    get:
      tags: [Organisations]
      operationId: getOrgSubscription
      summary: Current subscription plan + usage for the org
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgSubscriptionDetail' }

  /custom-roles/capabilities:
    get:
      tags: [CustomRoles]
      operationId: listCapabilities
      summary: Return the full capability catalog (grouped)
      responses:
        '200':
          description: Capability list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CapabilityDef' }

  /custom-roles:
    get:
      tags: [CustomRoles]
      operationId: listOrgCustomRoles
      summary: List custom roles for the current user's organisation
      responses:
        '200':
          description: Custom role list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OrgCustomRole' }
    post:
      tags: [CustomRoles]
      operationId: createOrgCustomRole
      summary: Create a new custom role for the org
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgCustomRoleWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgCustomRole' }
        '409':
          description: Name conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /custom-roles/{roleId}:
    parameters:
      - name: roleId
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [CustomRoles]
      operationId: updateOrgCustomRole
      summary: Update a custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgCustomRoleWrite' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [CustomRoles]
      operationId: deleteOrgCustomRole
      summary: Delete a custom role (detaches users first)
      responses:
        '204':
          description: Deleted

  /projects/{projectId}/modules:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    patch:
      tags: [Modules]
      operationId: updateProjectModules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: [array, 'null']
                  items: { type: string }
      responses:
        '200':
          description: Updated project module override
          content:
            application/json:
              schema:
                type: object
                required: [projectId, enabledModulesOverride]
                properties:
                  projectId: { type: string }
                  enabledModulesOverride:
                    type: [array, 'null']
                    items: { type: string }
  /projects/{projectId}/access:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [ProjectAccess]
      operationId: listProjectAccess
      responses:
        '200':
          description: Users with access to the project
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProjectAccessEntry' }
    post:
      tags: [ProjectAccess]
      operationId: grantProjectAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string }
      responses:
        '200':
          description: Already had access (idempotent)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectAccessEntry' }
        '201':
          description: Access granted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectAccessEntry' }
  /projects/{projectId}/access/{userId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
      - name: userId
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [ProjectAccess]
      operationId: revokeProjectAccess
      responses:
        '204':
          description: Revoked

  /geocode/reverse:
    post:
      tags: [Organisations]
      operationId: reverseGeocode
      summary: Reverse-geocode lat/lon into a human address (OpenStreetMap Nominatim)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReverseGeocodeRequest' }
      responses:
        '200':
          description: Geocoded result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReverseGeocodeResponse' }
        '400':
          description: Invalid coordinates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Project' }
    post:
      tags: [Projects]
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
  /projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [Projects]
      operationId: getProject
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
    patch:
      tags: [Projects]
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
    delete:
      tags: [Projects]
      operationId: deleteProject
      responses:
        '204':
          description: Deleted

  /projects/{projectId}/dashboard:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [Dashboard]
      operationId: getProjectDashboard
      summary: 6-panel project dashboard data (health, cost, gantt, activities, photos, pending)
      responses:
        '200':
          description: Project dashboard
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectDashboard' }

  /projects/{projectId}/wbs:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [WBS]
      operationId: listProjectWbs
      responses:
        '200':
          description: WBS activities
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WbsActivity' }
    post:
      tags: [WBS]
      operationId: createWbsActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WbsActivityInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WbsActivity' }
  /wbs/{activityId}:
    parameters:
      - name: activityId
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [WBS]
      operationId: updateWbsActivity
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WbsActivityUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WbsActivity' }
    delete:
      tags: [WBS]
      operationId: deleteWbsActivity
      responses:
        '204':
          description: Deleted

  /projects/{projectId}/milestones:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [Milestones]
      operationId: listProjectMilestones
      responses:
        '200':
          description: Milestones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Milestone' }
    post:
      tags: [Milestones]
      operationId: createMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MilestoneInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Milestone' }
  /milestones/{milestoneId}:
    parameters:
      - name: milestoneId
        in: path
        required: true
        schema: { type: string }
    patch:
      tags: [Milestones]
      operationId: updateMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MilestoneUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Milestone' }

  /projects/{projectId}/dprs:
    parameters:
      - $ref: '#/components/parameters/ProjectIdParam'
    get:
      tags: [DPR]
      operationId: listProjectDprs
      responses:
        '200':
          description: DPRs
