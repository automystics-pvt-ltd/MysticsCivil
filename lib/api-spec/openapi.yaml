      - { in: path, name: billId, required: true, schema: { type: string } }
    get:
      operationId: getLabourContractorBill
      tags: [Workforce]
      responses:
        "200": { description: Bill with cross-verification, content: { application/json: { schema: { type: object } } } }
    patch:
      operationId: updateLabourContractorBill
      tags: [Workforce]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/LabourContractorBill' } } } }

  # ── Platform Admin ──────────────────────────────────────────────────────────
  /admin/tenants:
    get:
      operationId: listAdminTenants
      tags: [PlatformAdmin]
      summary: List all tenants with subscription and usage info (super_admin only)
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AdminTenant' }

  /admin/tenants/{orgId}:
    parameters:
      - { in: path, name: orgId, required: true, schema: { type: string } }
    get:
      operationId: getAdminTenant
      tags: [PlatformAdmin]
      summary: Get full tenant detail
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTenant' }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    patch:
      operationId: updateAdminTenantStatus
      tags: [PlatformAdmin]
      summary: Activate, suspend, or cancel a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminTenantStatusUpdate' }
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTenant' }

  /admin/tenants/{orgId}/subscription:
    parameters:
      - { in: path, name: orgId, required: true, schema: { type: string } }
    get:
      operationId: getAdminTenantSubscription
      tags: [PlatformAdmin]
      summary: Full subscription detail for a tenant
      responses:
        "200":
          description: Subscription detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTenantSubscriptionDetail' }
    patch:
      operationId: updateAdminTenantSubscription
      tags: [PlatformAdmin]
      summary: Change plan, set limits override, or adjust trial/period dates
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminTenantSubscriptionUpdate' }
      responses:
        "200":
          description: Updated subscription detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTenantSubscriptionDetail' }

  /admin/invitations:
    get:
      operationId: listAdminInvitations
      tags: [PlatformAdmin]
      summary: All tenant invitations across all orgs (super_admin only)
      parameters:
        - { in: query, name: status, required: false, schema: { type: string } }
        - { in: query, name: orgId, required: false, schema: { type: string } }
      responses:
        "200":
          description: Invitations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AdminInvitation' }

  /admin/invitations/{invId}:
    delete:
      operationId: revokeAdminInvitation
      tags: [PlatformAdmin]
      summary: Revoke a pending invitation (super_admin only)
      parameters:
        - name: invId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean }

  /admin/custom-roles:
    get:
      operationId: listAdminCustomRoles
      tags: [PlatformAdmin]
      summary: All custom roles across all orgs (super_admin only)
      responses:
        "200":
          description: Custom roles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AdminCustomRole' }

  /admin/system-stats:
    get:
      operationId: getAdminSystemStats
      tags: [PlatformAdmin]
      summary: Platform-wide aggregate statistics (super_admin only)
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSystemStats' }

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema: { type: string }
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema: { type: string }
    ProjectIdParam:
      name: projectId
      in: path
      required: true
      schema: { type: string }
    OrganisationIdParam:
      name: organisationId
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id: { type: string }
        email: { type: [string, 'null'], format: email }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        profileImageUrl: { type: [string, 'null'] }
        globalRole: { type: [string, 'null'] }
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    RegisterRequest:
      type: object
      required: [email, password, orgName]
      properties:
        email: { type: string, format: email, minLength: 3 }
        password: { type: string, minLength: 8 }
        firstName: { type: string }
        lastName: { type: string }
        orgName: { type: string, minLength: 1 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success: { type: boolean, const: true }
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, const: true }

    RegisterTenantRequest:
      type: object
      required: [orgName, email, password, firstName]
      properties:
        orgName: { type: string, minLength: 1 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        firstName: { type: string, minLength: 1 }
        lastName: { type: string }
        industry: { type: string }
    RegisterTenantResponse:
      type: object
      required: [user, organisation]
      properties:
        user:
          type: object
          required: [id, email]
          properties:
            id: { type: string }
            email: { type: [string, 'null'] }
            firstName: { type: [string, 'null'] }
            lastName: { type: [string, 'null'] }
        organisation:
          type: object
          required: [id, name]
          properties:
            id: { type: string }
            name: { type: string }

    InvitationTokenDetail:
      type: object
      required: [id, email, role, expiresAt, organisation]
      properties:
        id: { type: string }
        email: { type: string }
        role: { type: string }
        expiresAt: { type: string, format: date-time }
        organisation:
          type: object
          required: [id, name]
          properties:
            id: { type: string }
            name: { type: string }
    AcceptInvitationRequest:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        password: { type: string, minLength: 8 }
    AcceptInvitationResponse:
      type: object
      required: [user, organisation]
      properties:
        user:
          type: object
          required: [id, email]
          properties:
            id: { type: string }
            email: { type: [string, 'null'] }
            firstName: { type: [string, 'null'] }
            lastName: { type: [string, 'null'] }
        organisation:
          type: object
          required: [id]
          properties:
            id: { type: string }

    OrgInvitation:
      type: object
      required: [id, email, role, status, createdAt, expiresAt]
      properties:
        id: { type: string }
        email: { type: string }
        role: { type: string }
        status: { type: string, enum: [pending, accepted, revoked, expired] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        acceptedAt: { type: ["string", "null"], format: date-time }
        revokedAt: { type: ["string", "null"], format: date-time }
    OrgInvitationInput:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/UserRole' }

    OrgMember:
      type: object
      required: [userId, email, role, joinedAt]
      properties:
        userId: { type: string }
        email: { type: [string, 'null'] }
        firstName: { type: [string, 'null'] }
        lastName: { type: [string, 'null'] }
        profileImageUrl: { type: [string, 'null'] }
        role: { type: string }
        customRoleId: { type: ["string", "null"] }
        phone: { type: [string, 'null'] }
        designation: { type: [string, 'null'] }
        joinedAt: { type: string, format: date-time }
    OrgMemberRoleUpdate:
      type: object
      required: [role]
      properties:
        role: { $ref: '#/components/schemas/UserRole' }
        customRoleId: { type: ["string", "null"] }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name: { type: string, minLength: 1 }
        size: { type: integer, minimum: 1 }
        contentType: { type: string, minLength: 1 }
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL: { type: string, format: uri }
        objectPath: { type: string }
        metadata: { $ref: '#/components/schemas/UploadUrlRequest' }

    UserRole:
      type: string
      enum: [owner, pm, site_engineer, qs, finance, contractor, qc, store, hr, admin]
    ProjectStatus:
      type: string
      enum: [not_started, on_track, at_risk, delayed, on_hold, completed]
    ActivityStatus:
      type: string
      enum: [not_started, on_track, at_risk, delayed, on_hold, completed]
    MilestoneStatus:
      type: string
      enum: [pending, on_track, at_risk, delayed, completed]
    DprStatus:
      type: string
      enum: [draft, submitted, approved, rejected]
    IssueSeverity:
      type: string
      enum: [low, medium, high, critical]

    MyProfile:
      type: object
