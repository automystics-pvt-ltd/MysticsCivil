            schema:
              type: object
              required: [builtUpArea]
              properties:
                builtUpArea:
                  type: number
                  description: Built-up area in sqm — used as quantity for each trade row
                cityTier:
                  type: string
                  description: City tier for DSR rate selection (T1/T2/T3)
                state:
                  type: string
                  description: State name for DSR rate selection
      responses:
        '200':
          description: Generated abstract BOQ items (one per trade)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BoqItem' }
        '404':
          description: No DSR rates found for selected state/tier
        '409':
