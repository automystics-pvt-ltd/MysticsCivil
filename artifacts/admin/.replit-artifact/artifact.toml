kind = "web"
previewPath = "/platform-admin/"
title = "Platform Admin Portal"
version = "1.0.0"
id = "artifacts/admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/platform-admin/" ]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
publicDir = "artifacts/admin/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/admin", "run", "build"]

[services.production.build.env]
BASE_PATH = "/platform-admin/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23744"
BASE_PATH = "/platform-admin/"
